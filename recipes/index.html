<!DOCTYPE html>
<html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Document</title>
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
            <link rel="stylesheet" href="recipes.css">                 
            
            <!-- Open Graph (Facebook, LinkedIn, etc.) -->
            <meta property="og:type" content="website">
            <meta property="og:title" content="Your Title">
            <meta property="og:description" content="Your Description">
            <meta property="og:url" content="Your URL">
            <meta property="og:image" content="social-preview-image.png">

            <!-- X Card -->
            <meta name="twitter:card" content="Social Preview Image">
            <meta name="twitter:title" content="Your Title">
            <meta name="twitter:description" content="Your Description">
            <meta name="twitter:image" content="social-preview-image.png">

            <!-- One favicon (ICO works everywhere) -->
            <link rel="icon" href="/favicon.ico">

            <!-- One Apple Touch Icon (iOS home screen) -->
            <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&family=Amatic+SC:wght@400;700&family=Lora:ital,wght@0,400..700;1,400..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">                            
        </head>
        <body>
<div class="recipe">
    <h1 class="maintitle">RECIPEBOOK</h1>
    <img class="logo" src="images/recipe-book.png" alt="recipe book icon">
</div>

<div class="searchbar">
    <input type="text" placeholder="Search for a recipe...">
    <button class="search" type="submit"></button>
</div>

<div class="food-container">
    <img class="food" src="/recipes/images/apple-crisp.jpg" alt="apple crisp">

    <button class="dessert" type="button">Dessert</button>

    <p class="title">Apple Crisp</p>

    <span
      class="rating"
      role="img"
      aria-label="Rating: 4 out of 5 stars">
      <span aria-hidden="true" class="icon-star">⭐</span>
      <span aria-hidden="true" class="icon-star">⭐</span>
      <span aria-hidden="true" class="icon-star">⭐</span>
      <span aria-hidden="true" class="icon-star">⭐</span>
      <span aria-hidden="true" class="icon-star-empty">☆</span>
    </span>

    <p class="description">A delicious and easy-to-make apple crisp recipe.</p>
</div>
<footer>

    <div class="social">
        <a href="#"><img class="icons" src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img class="icons" src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img class="icons" src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>

</footer>

</body>
</html>
